name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - 'draft/**'
      - 'claude/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute CF Pages branch name
        id: branch
        run: |
          # CF Pages branch names can't contain slashes.
          # For main: --branch=main (production).
          # For draft/<slug>: --branch=draft-<slug> (preview).
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "cf_branch=main" >> "$GITHUB_OUTPUT"
            echo "is_preview=false" >> "$GITHUB_OUTPUT"
          else
            SAFE=$(echo "${GITHUB_REF_NAME}" | sed 's|/|-|g')
            echo "cf_branch=${SAFE}" >> "$GITHUB_OUTPUT"
            echo "is_preview=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=blue-collar-techy --branch=${{ steps.branch.outputs.cf_branch }} --commit-dirty=true

      - name: Fetch CF Pages alias URL
        if: steps.branch.outputs.is_preview == 'true'
        id: alias
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_BRANCH: ${{ steps.branch.outputs.cf_branch }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          # CF truncates branch aliases to 28 chars. Query the API for the
          # actual alias URL of the most recent deployment on this branch.
          ALIAS=$(curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT_ID/pages/projects/blue-collar-techy/deployments?per_page=20" \
            | jq -r --arg b "$CF_BRANCH" '.result[] | select(.deployment_trigger.metadata.branch == $b) | .aliases[0]' | grep -v '^null$' | head -1)
          if [ -z "$ALIAS" ]; then ALIAS="$DEPLOY_URL"; fi
          echo "preview_url=$ALIAS" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram with preview URL
        if: steps.branch.outputs.is_preview == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PREVIEW_URL: ${{ steps.alias.outputs.preview_url }}
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          PR_REF: ${{ github.ref_name }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "No Telegram secrets, skipping"
            exit 0
          fi
          git fetch origin main --depth=50 || true
          # draft/** branches ship a newly added blog file; claude/** revision
          # branches modify an existing one. -AM covers both cases.
          POST_SLUG=$(git log --name-only --diff-filter=AM --pretty=format: origin/main..HEAD -- 'blog/*.html' 2>/dev/null | grep -v '^$' | head -1 | xargs -I {} basename {} .html)
          if [ -n "$POST_SLUG" ]; then POST_PATH="/blog/$POST_SLUG"; else POST_PATH=""; fi
          PR_NUM=$(gh pr list --head "$PR_REF" --json number --jq '.[0].number' 2>/dev/null || echo "")

          # On claude/** revision branches the /bct-draft skill didn't create
          # a PR, so auto-open a draft PR here so the Approve button wires up.
          if [ -z "$PR_NUM" ] && [[ "$PR_REF" == claude/* ]]; then
            PR_TITLE="Revise: ${POST_SLUG:-$PR_REF}"
            PR_BODY=$(printf 'Automated revision preview for branch `%s`.\n\nPreview: %s%s\n\nMerging will publish the revised post.' \
              "$PR_REF" "$PREVIEW_URL" "$POST_PATH")
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$PR_REF" \
              --title "$PR_TITLE" \
              --body "$PR_BODY" 2>&1 || true
            PR_NUM=$(gh pr list --head "$PR_REF" --json number --jq '.[0].number' 2>/dev/null || echo "")
          fi

          # Header varies for new drafts vs revisions so the Telegram ping is self-explanatory.
          if [[ "$PR_REF" == claude/* ]]; then
            HEADER="🟠 BCT Revision ready for review"
          else
            HEADER="🟠 BCT Preview ready for review"
          fi

          # Message 1: preview + PR link + Approve button
          MSG1=$(printf '%s\nPreview: %s%s\nPR: https://github.com/%s/pull/%s\n\nTap the button below to approve, or copy the next message into Claude Code mobile to request changes.' \
            "$HEADER" "$PREVIEW_URL" "$POST_PATH" "$GITHUB_REPOSITORY" "${PR_NUM:-?}")

          if [ -n "$PR_NUM" ]; then
            KEYBOARD=$(printf '{"inline_keyboard":[[{"text":"✅ Approve & Ship","callback_data":"approve:%s"}]]}' "$PR_NUM")
            PAYLOAD=$(jq -n --arg chat "$TELEGRAM_CHAT_ID" --arg text "$MSG1" --argjson kb "$KEYBOARD" \
              '{chat_id:$chat, text:$text, reply_markup:$kb}')
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              --data "$PAYLOAD" > /dev/null
          else
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MSG1}" > /dev/null
          fi

          # Message 2: standalone revise prompt (tap-hold-copy the whole message)
          MSG2="Revise BCT draft ${POST_SLUG:-unknown}: <describe the change>"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG2}" > /dev/null
