name: Auto-merge approved draft PRs

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.event.review.state == 'approved' && startsWith(github.event.pull_request.head.ref, 'draft/')
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash) on approved draft PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --auto \
            --delete-branch \
            --repo ${{ github.repository }}
