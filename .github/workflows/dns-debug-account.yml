name: Debug CF account + zone

on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain"
        required: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Token + zone info
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_DNS_TOKEN }}
          DOMAIN: ${{ inputs.domain }}
        run: |
          set -euo pipefail
          echo "--- token identity ---"
          curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" | jq
          echo "--- accounts visible to token ---"
          curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/accounts" | jq '.result[] | {id, name}'
          echo "--- zone(s) matching $DOMAIN ---"
          curl -sS -H "Authorization: Bearer $CF_API_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$DOMAIN" | jq '.result[] | {id, name, status, paused, account: .account.name, type, name_servers}'
